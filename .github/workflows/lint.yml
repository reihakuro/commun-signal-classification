name: Lint CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'            
      - '.gitignore'    
      - 'LICENSE'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'            
      - '.gitignore'    
      - 'LICENSE'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff

    - name: Lint code with Ruff
      run: |
        ruff check .

    